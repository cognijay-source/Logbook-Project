name: Sync main from master

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward main to master
        run: |
          git checkout main
          git merge --ff-only master
          git push origin main
